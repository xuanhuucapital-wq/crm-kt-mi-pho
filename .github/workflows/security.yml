name: Security checks

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "20 2 * * 1"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
        env:
          NODE_ENV: test
          APP_AUTH_SECRET: test-only-secret-test-only-secret-test-only-secret-test-only-secret-1234
      - run: npx wrangler deploy --dry-run
